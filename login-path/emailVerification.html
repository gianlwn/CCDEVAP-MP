<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/all.min.css" />
  <link rel="stylesheet" href="../css/admin-style.css" />
  <link rel="stylesheet" href="../css/login-style.css" />
  <title>CampusCart | Verify Identity</title>
</head>
<body class="auth-viewport-center">

  <div class="auth-card-panel">
    <div class="auth-card-header">
      <div class="auth-brand-logo-container">
        <div class="brand-logo-circle">
          <i class="fa-solid fa-graduation-cap"></i>
        </div>
      </div>
      <h1 class="brand-header-banner">EXCLUSIVELY FOR STUDENTS!</h1>
    </div>

    <div id="error-alert" class="alert-banner alert-error"></div>
    <div id="success-alert" class="alert-banner alert-success"></div>

    <form id="verifyForm" class="auth-form-container" onsubmit="validateSecurityToken(event)">
      <div class="input-group">
        <label for="email">School Email</label>
        <input type="email" id="email" class="auth-pill-input" placeholder="account@university.edu.ph" pattern="^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.edu\.ph$" required/>
      </div>

      <button type="button" id="sendCodeBtn" class="auth-pill-dispatch-code-btn" onclick="simulateTokenDispatch()">SEND VERIFICATION CODE</button>
      <div id="timerDisplay" class="timer-text" style="text-align: center; margin-top: 4px;"></div>

      <div class="input-group" style="margin-top: 12px;">
        <label for="code">Verification Code</label>
        <input type="text" id="code" class="auth-pill-input" placeholder="Enter verification code" required/>
      </div>

      <button type="submit" id="confirmBtn" class="auth-pill-confirm-btn">CONFIRM</button>
    </form>

    <div class="auth-outer-actions-bar">
      <a href="login.html" class="auth-register-capsule-link">Back to Login</a>
    </div>
  </div>

  <script src="../js/toggletheme.js"></script>
  <script src="../js/auth-flows.js"></script>
</body>
</html>

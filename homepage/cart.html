<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart – Cart</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .cart-list { display: flex; flex-direction: column; gap: 10px; max-width: 680px; }

    .cart-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      box-shadow: var(--shadow);
      transition: all var(--transition);
    }

    .cart-thumb {
      width: 52px; height: 52px;
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }

    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name  { font-weight: 600; font-size: 14px; color: var(--text); }
    .cart-item-meta  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .cart-item-price { font-weight: 700; font-size: 14px; color: var(--accent); flex-shrink: 0; }

    .cart-remove {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 18px;
      border-radius: var(--radius-xs); padding: 4px 6px;
      transition: all var(--transition); flex-shrink: 0;
    }
    .cart-remove:hover { background: var(--danger-bg); color: var(--danger-text); }

    .cart-footer {
      max-width: 680px;
      margin-top: 20px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow-card);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      transition: background-color var(--transition);
    }

    .cart-total-label { font-size: 13px; color: var(--text-muted); }
    .cart-total-val   { font-size: 22px; font-weight: 700; color: var(--accent); }

    .btn-claim {
      padding: 10px 24px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-xs);
      cursor: pointer; font-size: 14px; font-weight: 600;
      transition: all var(--transition);
    }
    .btn-claim:hover { background: var(--accent-hover); transform: translateY(-1px); }
  </style>
</head>
<body>

  <div id="top-nav"></div>

  <div class="page-top-only">
    <h1 class="page-title">Cart</h1>

    <div class="cart-list" id="cart-list">
      <p style="color:var(--text-muted);">Loading…</p>
    </div>

    <div class="cart-footer" id="cart-footer" style="display:none;">
      <div>
        <p class="cart-total-label">Total</p>
        <p class="cart-total-val" id="cart-total">₱0</p>
      </div>
      <button class="btn-claim" onclick="handleClaim()">Claim All</button>
    </div>
  </div>

  <script src="../js/components.js"></script>
  <script src="../js/toggleTheme.js"></script>
  <script src="../js/toastNotification.js"></script>
  <script src="../js/main.js"></script>

  <script>
    const EMOJI = { Electronics: '💻', Books: '📚', 'Lab Tools': '🧪', Clothing: '👕', Others: '📦' };
    let cartItems = [];

    function renderCart() {
      const el = document.getElementById('cart-list');
      if (!cartItems.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><p>Your cart is empty.</p></div>`;
        document.getElementById('cart-footer').style.display = 'none';
        return;
      }
      el.innerHTML = cartItems.map(item => `
        <div class="cart-row">
          <button class="cart-remove" onclick="removeItem(${item.id})" title="Remove">✕</button>
          <div class="cart-thumb">${EMOJI[item.category] || '📦'}</div>
          <div class="cart-item-info">
            <p class="cart-item-name">${item.name}</p>
            <p class="cart-item-meta">${item.category}</p>
          </div>
          <p class="cart-item-price">₱${item.price}</p>
          <button class="btn-msg" title="Message seller">💬</button>
        </div>
      `).join('');

      const total = cartItems.reduce((s, i) => s + i.price, 0);
      document.getElementById('cart-total').textContent = '₱' + total;
      document.getElementById('cart-footer').style.display = 'flex';
    }

    function removeItem(id) {
      cartItems = cartItems.filter(i => i.id !== id);
      renderCart();
      showToast('Removed', 'Item removed from cart.', 'warning');
    }

    function handleClaim() {
      showToast('Claimed!', 'Items reserved. Coordinate with sellers to complete exchange.', 'success', 4000);
      cartItems = [];
      renderCart();
    }

    document.addEventListener('DOMContentLoaded', function () {
      fetch('../data/mock-claimed.json')
        .then(r => r.json())
        .then(items => {
          cartItems = items.slice(0, 4).map(i => ({
            id: i.id, name: i.name,
            price: parseInt(i.price.replace('₱', '')),
            category: i.category
          }));
          renderCart();
        })
        .catch(() => {
          document.getElementById('cart-list').innerHTML =
            '<p style="color:var(--text-muted);">Could not load cart.</p>';
        });
    });
  </script>
</body>
</html>
